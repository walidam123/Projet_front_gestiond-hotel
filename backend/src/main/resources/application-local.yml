spring:
  datasource:
    url: jdbc:h2:mem:hoteldb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  sql:
    init:
      mode: never

server:
  port: 8080

jwt:
  secret: averylongsecretkeyforjwttokengenerationthatmustbeatleast256bitslong12345
  expiration: 86400000
